<!DOCTYPE html>
{% load static %}
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Shop</title>
        <link rel="stylesheet" href="{% static 'shop/style.css' %}">
    </head>
    <body>
        <div class="mobile-topbar">
            <a href="{% url 'product-list' %}" class="logo">Shop</a>

            <button class="menu-toggle" type="button" onclick="toggleMenu()" aria-label="Ouvrir le menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <div class="layout">
            <nav class="sidebar">
                <a href="{% url 'product-list' %}" class="logo desktop-logo">Shop</a>

                {% with request.resolver_match.url_name as url_name %}
                <div class="sidebar-links">
                    <a href="{% url 'product-list' %}"
                       class="{% if url_name == 'product-list' %}active{% endif %}">
                        Produits
                    </a>

                    <a href="{% url 'product-create' %}"
                       class="{% if url_name == 'product-create' %}active{% endif %}">
                        Ajouter un produit
                    </a>

                    <a href="{% url 'invoice-list' %}"
                       class="{% if url_name == 'invoice-list' or url_name == 'invoice-detail' %}active{% endif %}">
                        Factures
                    </a>

                    <a href="{% url 'invoice-create' %}"
                       class="{% if url_name == 'invoice-create' %}active{% endif %}">
                        Créer une facture
                    </a>
                </div>
                {% endwith %}
            </nav>

            <main class="main-content">
                {% block content %}
                {% endblock %}
            </main>
        </div>

        <script>
            function toggleMenu() {
                document.body.classList.toggle("sidebar-open");
            }
        </script>
    </body>
</html>
