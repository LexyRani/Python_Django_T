{% extends "shop/base.html" %}

{% block content %}
    <div class="content-container">
        <div class="page-header">
            <h1>Détail du produit</h1>
            <a href="{% url 'product-list' %}" class="btn btn-secondary">Retour à la liste</a>
        </div>

        <div class="card">
            <p><strong>Nom :</strong> {{ product.name }}</p>
            <p><strong>Prix :</strong> {{ product.price }}</p>
            <p><strong>Date d'expiration :</strong> {{ product.expiration_date|date:"d/m/Y" }}</p>

            <div class="form-actions">
                <a href="{% url 'product-update' product.pk %}" class="btn">Mettre à jour</a>
                <a href="{% url 'product-delete' product.pk %}" class="btn btn-secondary">Supprimer</a>
            </div>
        </div>
    </div>
{% endblock %}
