{% extends "shop/base.html" %}
{% block content %}
    {% if product.pk %}
    <h1>Modifier un produit</h1>
    {% else %}
    <h1>Créer un produit</h1>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enregistrer le produit</button>
    </form>
{% endblock %}
