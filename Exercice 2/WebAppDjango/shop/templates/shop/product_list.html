<!Doctype html>
<!-- un titre de page, une boucle sur product, une zone pagination avec page_obj -->
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <h1> Product List</h1>
            <ul>
            {% for product in products %}
                <li>{{product.name}} - {{product.price}} - {{product.expiration_date}}</li>
            {% empty %}
            <li>Aucun produit disponible.</li>
            {% endfor %}
            </ul>
    </body>    
</html>
